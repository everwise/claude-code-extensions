<!--
  REPORT TEMPLATE
  =======================
  Base template for all Claude Code generated HTML reports.
  Uses the Torch design system — all values come from DESIGN.md.

  STRUCTURE:
  1. Header (REQUIRED) — teal background, Torch logo, report title, disclaimer
  2. Metrics Bar (OPTIONAL) — overlapping summary metrics; include ONLY when
     the report has 3–5 key numeric KPIs that benefit from top-level visibility.
     Omit entirely for narrative reports, lists, or reports without aggregate stats.
  3. Content body — the report body. Section patterns below are EXAMPLES;
     mix, match, repeat, or omit any of them to fit the data.

  INSTRUCTIONS FOR THE AGENT:
  - Use the header, CSS exactly. The content body is flexible —
    compose it from the section patterns (narrative, table) as needed.
    Use any pattern zero or more times in whatever order fits the report.
  - Replace placeholder content (wrapped in { }) with real data.
  - If the metrics bar is not appropriate, remove the entire
    <div class="metrics-bar">...</div> block AND change .content padding-top
    from 80px to 48px (the 80px accounts for the overlapping bar).
  - All CSS custom properties are pre-set in :root — do not modify values.
  - Do not add external resources, JavaScript, or CDN links.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{Report Title}</title>
    <style>
      :root {
        /* Torch brand palette */
        --gold: #f2b61b;
        --orange: #f14a08;
        --maroon: #7a0800;
        --teal: #003744;
        --near-black: #16000d;
        --warm-white: #fff8f4;
        --mint: #ddefe5;
        --ice: #d3f3f2;
        --dark-gold: #bf8d0b;

        /* Data visualization */
        --viz-green: #3e8b47;
        --viz-teal: #5cb8b2;

        /* Semantic mapping */
        --bg: #fff8f4;
        --surface: #fffcfa;
        --text: #16000d;
        --text-secondary: #5a4d49;
        --accent: #7a0800;
        --highlight: #f2b61b;
        --highlight-subtle: #fdf3d7;
        --border: #e8ddd6;
        --success: #ddefe5;
        --success-text: #1a5c38;

        /* Typography */
        --font-heading:
          'Gibonic', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        --font-mono: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, monospace;

        /* Layout */
        --max-width: 1100px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 24px;
        color: var(--text);
        background: var(--bg);
      }

      /* ──────────────────────────────────────
         HEADER (REQUIRED)
         Teal background, Torch logo, title, meta
         ────────────────────────────────────── */
      .header {
        background: var(--teal);
        color: var(--warm-white);
        padding: 48px 40px 0;
      }

      .header-inner {
        max-width: var(--max-width);
        margin: 0 auto;
      }

      .header-brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .torch-logo {
        flex-shrink: 0;
      }

      .header h1 {
        font-family: var(--font-heading);
        font-size: 36px;
        line-height: 48px;
        font-weight: 600;
      }

      .header .meta {
        font-size: 14px;
        line-height: 24px;
        color: var(--ice);
        margin-top: 8px;
      }

      /* ──────────────────────────────────────
         METRICS BAR (OPTIONAL)
         Include ONLY when the report has 3–5 key
         numeric KPIs. Omit for narrative reports.
         When omitted, change .content padding-top
         from 80px → 48px.
         ────────────────────────────────────── */
      .metrics-bar {
        max-width: var(--max-width);
        margin: 0 auto;
        display: flex;
        gap: 0;
        margin-top: 0;
        transform: translateY(50%);
      }

      .metrics-bar .metric {
        flex: 1;
        background: var(--surface);
        padding: 24px;
        border: 1px solid var(--border);
        text-align: center;
      }

      .metrics-bar .metric:first-child {
        border-radius: 8px 0 0 8px;
      }

      .metrics-bar .metric:last-child {
        border-radius: 0 8px 8px 0;
      }

      .metrics-bar .metric + .metric {
        border-left: none;
      }

      .metric .label {
        font-size: 14px;
        line-height: 24px;
        color: var(--text-secondary);
      }

      .metric .value {
        font-size: 20px;
        line-height: 32px;
        font-weight: 600;
        color: var(--text);
        margin-top: 4px;
      }

      .metric .value.gold {
        color: var(--dark-gold);
      }

      /* ──────────────────────────────────────
         CONTENT AREA
         ────────────────────────────────────── */
      .content {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 80px 40px 48px; /* 80px top when metrics bar present; use 48px when omitted */
      }

      h2 {
        font-family: var(--font-heading);
        font-size: 24px;
        line-height: 32px;
        font-weight: 600;
        margin-bottom: 24px;
      }

      section {
        margin-bottom: 48px;
      }

      p {
        margin-bottom: 16px;
      }

      /* ──────────────────────────────────────
         DATA TABLES
         ────────────────────────────────────── */
      .table-wrapper {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        line-height: 24px;
      }

      th {
        font-weight: 600;
        text-align: left;
        padding: 8px 16px;
        border-bottom: 2px solid var(--border);
        background: var(--bg);
        position: sticky;
        top: 0;
      }

      td {
        padding: 8px 16px;
        border-bottom: 1px solid var(--border);
      }

      tr:nth-child(even) {
        background: var(--bg);
      }
      tr:hover {
        background: var(--highlight-subtle);
      }

      td.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      /* Progress bars in table cells */
      .bar-cell {
        min-width: 120px;
      }

      .bar-track {
        height: 8px;
        background: var(--border);
        border-radius: 4px;
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: 4px;
        background: var(--teal);
      }

      .bar-fill.warn {
        background: var(--gold);
      }
      .bar-fill.bad {
        background: var(--orange);
      }


      /* ──────────────────────────────────────
         RESPONSIVE
         ────────────────────────────────────── */
      @media (max-width: 768px) {
        .header {
          padding: 32px 16px 0;
        }
        .header h1 {
          font-size: 24px;
          line-height: 32px;
        }
        .metrics-bar {
          flex-direction: column;
          margin-top: 32px;
          transform: translateY(24px);
        }
        .metrics-bar .metric {
          border-radius: 0;
          border-left: 1px solid var(--border);
          border-top: none;
        }
        .metrics-bar .metric:first-child {
          border-radius: 8px 8px 0 0;
          border-top: 1px solid var(--border);
        }
        .metrics-bar .metric:last-child {
          border-radius: 0 0 8px 8px;
        }
        .content {
          padding: 48px 16px;
        }
      }
    </style>
  </head>
  <body>

          <h1>{Report Title}</h1>
        </div>
        <div class="meta">For internal use only, do not distribute</div>
      </div>

      <!-- ============================================
           METRICS BAR (OPTIONAL)
           Include this block ONLY when the report has
           3–5 key numeric KPIs that benefit from
           top-level visibility. For narrative reports,
           lists, or reports without aggregate stats,
           DELETE this entire metrics-bar div and change
           .content padding-top from 80px to 48px.
           ============================================ -->
      <div class="metrics-bar">
        <div class="metric">
          <div class="label">{Metric 1 Label}</div>
          <div class="value">{Value}</div>
        </div>
        <div class="metric">
          <div class="label">{Metric 2 Label}</div>
          <div class="value gold">{Value}</div>
        </div>
        <div class="metric">
          <div class="label">{Metric 3 Label}</div>
          <div class="value">{Value}</div>
        </div>
        <div class="metric">
          <div class="label">{Metric 4 Label}</div>
          <div class="value">{Value}</div>
        </div>
      </div>
    </div>

    <!-- ============================================
         CONTENT BODY
         The section patterns below are EXAMPLES, not
         a fixed structure. Mix, match, repeat, or omit
         any of them to fit the report's data. The only
         rule: wrap each logical group in a <section>.
         ============================================ -->
    <div class="content">
      <!-- PATTERN: Narrative section (text paragraphs) -->
      <section>
        <h2>{Section Title}</h2>
        <p>{Narrative text, analysis, or context.}</p>
      </section>

      <!-- PATTERN: Data table with optional progress bars -->
      <section>
        <h2>{Section Title}</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>{Column}</th>
                <th>{Column}</th>
                <th>Progress</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>{Data}</td>
                <td class="num">{Number}</td>
                <td class="bar-cell">
                  <div class="bar-track">
                    <div class="bar-fill" style="width: {percent}%"></div>
                  </div>
                </td>
              </tr>
              <!-- bar-fill: default (teal), .warn (gold, 70-80%), .bad (orange, <70%) -->
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </body>
</html>
